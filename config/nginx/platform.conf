server {
    listen 8080;
    server_name localhost;

    # 前端代码目录
    location / {
        root /platform/platform-front;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 错误页面配置
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root html;
    }
}
