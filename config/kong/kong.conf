# Kong 配置文件
# 文档: https://docs.konghq.com/2.2.x/configuration/

# -----------------------------------------------------------------------------
# 数据库配置
# -----------------------------------------------------------------------------
database = postgres
pg_host = 127.0.0.1
pg_port = 5432
pg_user = postgres
pg_password = lowcodestudio
pg_database = kong

# -----------------------------------------------------------------------------
# 代理监听配置
# -----------------------------------------------------------------------------
proxy_listen = 0.0.0.0:8000, 0.0.0.0:8443 ssl
stream_listen = off

# -----------------------------------------------------------------------------
# Admin API 监听配置
# -----------------------------------------------------------------------------
admin_listen = 0.0.0.0:8001, 0.0.0.0:8444 ssl

# -----------------------------------------------------------------------------
# 状态 API 监听配置
# -----------------------------------------------------------------------------
status_listen = off

# -----------------------------------------------------------------------------
# 集群配置
# -----------------------------------------------------------------------------
cluster_listen = off
cluster_control_plane = off

# -----------------------------------------------------------------------------
# DNS 解析器配置
# -----------------------------------------------------------------------------
dns_resolver = 127.0.0.11:53
dns_order = LAST,A,CNAME
dns_stale_ttl = 4
dns_not_found_ttl = 30
dns_error_ttl = 1
dns_no_sync = off

# -----------------------------------------------------------------------------
# 日志配置
# -----------------------------------------------------------------------------
log_level = notice
proxy_access_log = /var/log/kong/proxy_access.log
proxy_error_log = /var/log/kong/proxy_error.log
admin_access_log = /var/log/kong/admin_access.log
admin_error_log = /var/log/kong/admin_error.log

# -----------------------------------------------------------------------------
# 插件配置
# -----------------------------------------------------------------------------
plugins = bundled,poros-auth
pluginserver_names = 

# -----------------------------------------------------------------------------
# Lua 配置
# -----------------------------------------------------------------------------
lua_package_path = ./?.lua;./?/init.lua;;
lua_package_cpath = ;;
lua_socket_pool_size = 30

# -----------------------------------------------------------------------------
# 工作进程配置
# -----------------------------------------------------------------------------
worker_processes = auto
worker_connections = 16384

# -----------------------------------------------------------------------------
# 其他配置
# -----------------------------------------------------------------------------
prefix = /usr/local/kong
nginx_user = kong kong
nginx_daemon = on
nginx_worker_processes = auto
